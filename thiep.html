<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thiep Gui Han</title>
  <meta name="description" content="Thiep nho ky ten Cuong gui den Han.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #45283f;
      --accent: #c43e86;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: "Be Vietnam Pro", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 15%, rgba(255, 191, 216, 0.8) 0, transparent 35%),
        radial-gradient(circle at 85% 78%, rgba(255, 219, 171, 0.8) 0, transparent 30%),
        linear-gradient(135deg, #ffe6f0 0%, #fff4dc 100%);
    }

    .card {
      width: min(760px, 100%);
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.65);
      background: rgba(255, 252, 246, 0.9);
      backdrop-filter: blur(6px);
      box-shadow: 0 18px 50px rgba(89, 23, 61, 0.22);
      padding: 28px 24px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      right: -45px;
      top: -55px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 134, 186, 0.45) 0%, rgba(255, 134, 186, 0) 70%);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(34px, 6.4vw, 58px);
      font-family: "Great Vibes", cursive;
      color: var(--accent);
      font-weight: 400;
    }

    p {
      margin: 8px 0;
      line-height: 1.65;
      font-size: clamp(16px, 2.2vw, 20px);
    }

    .sign {
      margin-top: 20px;
      font-family: "Great Vibes", cursive;
      font-size: clamp(34px, 6vw, 54px);
      color: #b53574;
      text-align: right;
    }

    .back-link {
      margin-top: 14px;
      display: inline-block;
      color: #8f2d61;
      text-decoration: none;
      font-weight: 700;
      border-bottom: 1px dashed rgba(143, 45, 97, 0.45);
    }
  </style>
</head>
<body>
  <article class="card">
    <h1>Gui Han</h1>
    <p>
      Mot chut de thuong, mot chut lang man, va rat nhieu chan thanh duoc goi vao tam thiep nay.
      Mong Han luon vui, luon ruc ro, va gap that nhieu dieu dep de thuong trong moi ngay.
    </p>
    <p>
      Cam on Han da la nguoi dac biet trong trai tim cua minh.
    </p>
    <div class="sign">Ky ten: Cường</div>
    <a class="back-link" href="index.html">Quay lai bo hoa</a>
  </article>
</body>
</html>
